<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novalure Lead Operations Loop</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050607;
    }
    .novalure-loop-wrap {
      width: min(100vw, 1400px);
      margin: 0 auto;
      background: #050607;
    }
    .novalure-loop-wrap svg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 2 / 1;
    }
    @media (prefers-reduced-motion: reduce) {
      .novalure-loop-wrap * { animation: none !important; }
      .novalure-loop-wrap animateMotion { display: none; }
    }
  </style>
</head>
<body>
  <main class="novalure-loop-wrap">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 700" width="1400" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Novalure real estate lead operations loop</title>
  <desc id="desc">Animated four-step endless loop process: Pipeline Audit, Bottleneck Analysis, System Setup, CRM-ready Lead Operations.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#10211c" stop-opacity="0.28"/>
      <stop offset="48%" stop-color="#050607" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#050607" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090d0c"/>
      <stop offset="100%" stop-color="#07100d"/>
    </linearGradient>
    <linearGradient id="activePanelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10211c"/>
      <stop offset="100%" stop-color="#0b1a15"/>
    </linearGradient>
    <filter id="lineGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softHalo" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style><![CDATA[
      :root {
        --bg: #050607;
        --panel: #090d0c;
        --active: #10211c;
        --accent: #9fd8be;
        --muted: #c9d4ce;
        --white: #f3f1e8;
      }
      svg { background: #050607; }
      .headline { font-family: Georgia, 'Times New Roman', serif; font-size: 54px; letter-spacing: -0.02em; fill: #f3f1e8; }
      .headline .accent { fill: #9fd8be; }
      .subhead { font-family: Inter, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; letter-spacing: 0.32em; fill: #c9d4ce; opacity: 0.78; }
      .panel { fill: url(#panelGradient); stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
      .panel-active-fill { fill: url(#activePanelGradient); stroke: #9fd8be; stroke-width: 1.4; opacity: 0; filter: url(#softHalo); }
      .step-num { font-family: Inter, 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #f3f1e8; letter-spacing: 0.03em; }
      .step-label { font-family: Inter, 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #f3f1e8; letter-spacing: 0.08em; }
      .micro { font-family: Inter, 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #c9d4ce; letter-spacing: 0.12em; opacity: 0.58; }
      .icon { fill: none; stroke: #9fd8be; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.92; }
      .divider { stroke: rgba(201, 212, 206, 0.26); stroke-width: 1; }
      .loop-base { fill: none; stroke: rgba(159,216,190,0.18); stroke-width: 1.4; }
      .loop-soft { fill: none; stroke: rgba(159,216,190,0.34); stroke-width: 1.1; filter: url(#lineGlow); opacity: 0; animation: fullPathGlow 8s ease-in-out infinite; }
      .flow-highlight { fill: none; stroke: #9fd8be; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 72 928; stroke-dashoffset: 1000; pathLength: 1000; filter: url(#lineGlow); opacity: 0.9; animation: flowMove 8s linear infinite; }
      .node { fill: #050607; stroke: #9fd8be; stroke-width: 1.4; opacity: 0.72; }
      .traveller { fill: #9fd8be; filter: url(#lineGlow); opacity: 0.95; }
      .footer-brand { font-family: Georgia, 'Times New Roman', serif; font-size: 42px; fill: #f3f1e8; letter-spacing: 0.02em; }
      .footer-slogan { font-family: Inter, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #9fd8be; letter-spacing: 0.42em; }
      .signal { font-family: Inter, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; letter-spacing: 0.22em; fill: #9fd8be; opacity: 0.7; }

      #active1 { animation: cardActive1 8s ease-in-out infinite; }
      #active2 { animation: cardActive2 8s ease-in-out infinite; }
      #active3 { animation: cardActive3 8s ease-in-out infinite; }
      #active4 { animation: cardActive4 8s ease-in-out infinite; }
      #panel1 { animation: panelStroke1 8s ease-in-out infinite; }
      #panel2 { animation: panelStroke2 8s ease-in-out infinite; }
      #panel3 { animation: panelStroke3 8s ease-in-out infinite; }
      #panel4 { animation: panelStroke4 8s ease-in-out infinite; }
      .step1-accent { animation: textPulse1 8s ease-in-out infinite; }
      .step2-accent { animation: textPulse2 8s ease-in-out infinite; }
      .step3-accent { animation: textPulse3 8s ease-in-out infinite; }
      .step4-accent { animation: textPulse4 8s ease-in-out infinite; }
      .soft-pulse { animation: ambientPulse 8s ease-in-out infinite; transform-origin: center; }

      @keyframes flowMove {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes fullPathGlow {
        0%, 72%, 100% { opacity: 0; }
        80%, 91% { opacity: 0.95; }
      }
      @keyframes ambientPulse {
        0%, 100% { opacity: 0.52; }
        48% { opacity: 0.88; }
      }
      @keyframes cardActive1 {
        0%, 15% { opacity: 0.94; }
        20%, 100% { opacity: 0; }
      }
      @keyframes cardActive2 {
        0%, 18% { opacity: 0; }
        23%, 36% { opacity: 0.94; }
        41%, 100% { opacity: 0; }
      }
      @keyframes cardActive3 {
        0%, 39% { opacity: 0; }
        44%, 57% { opacity: 0.94; }
        62%, 100% { opacity: 0; }
      }
      @keyframes cardActive4 {
        0%, 60% { opacity: 0; }
        65%, 78% { opacity: 0.94; }
        84%, 100% { opacity: 0; }
      }
      @keyframes panelStroke1 {
        0%, 15% { stroke: #9fd8be; stroke-width: 1.8; }
        20%, 100% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
      }
      @keyframes panelStroke2 {
        0%, 18% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
        23%, 36% { stroke: #9fd8be; stroke-width: 1.8; }
        41%, 100% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
      }
      @keyframes panelStroke3 {
        0%, 39% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
        44%, 57% { stroke: #9fd8be; stroke-width: 1.8; }
        62%, 100% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
      }
      @keyframes panelStroke4 {
        0%, 60% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
        65%, 78% { stroke: #9fd8be; stroke-width: 1.8; }
        84%, 100% { stroke: rgba(201, 212, 206, 0.28); stroke-width: 1.2; }
      }
      @keyframes textPulse1 {
        0%, 15% { fill: #9fd8be; opacity: 1; }
        20%, 100% { fill: #f3f1e8; opacity: 0.92; }
      }
      @keyframes textPulse2 {
        0%, 18% { fill: #f3f1e8; opacity: 0.92; }
        23%, 36% { fill: #9fd8be; opacity: 1; }
        41%, 100% { fill: #f3f1e8; opacity: 0.92; }
      }
      @keyframes textPulse3 {
        0%, 39% { fill: #f3f1e8; opacity: 0.92; }
        44%, 57% { fill: #9fd8be; opacity: 1; }
        62%, 100% { fill: #f3f1e8; opacity: 0.92; }
      }
      @keyframes textPulse4 {
        0%, 60% { fill: #f3f1e8; opacity: 0.92; }
        65%, 78% { fill: #9fd8be; opacity: 1; }
        84%, 100% { fill: #f3f1e8; opacity: 0.92; }
      }
    ]]></style>
  </defs>

  <rect width="1400" height="700" fill="#050607"/>
  <rect width="1400" height="700" fill="url(#bgGlow)"/>

  <text x="700" y="74" text-anchor="middle" class="headline">First diagnose, then build.</text>
  <text x="700" y="113" text-anchor="middle" class="subhead">REAL ESTATE LEAD OPERATIONS</text>

  <path id="loopPath" class="loop-base" pathLength="1000" d="M 214 312 L 514 312 L 814 312 L 1114 312 C 1235 312 1280 463 1134 526 L 214 526 C 64 526 68 366 214 312 Z"/>
  <path class="loop-soft" pathLength="1000" d="M 214 312 L 514 312 L 814 312 L 1114 312 C 1235 312 1280 463 1134 526 L 214 526 C 64 526 68 366 214 312 Z"/>
  <path class="flow-highlight" pathLength="1000" d="M 214 312 L 514 312 L 814 312 L 1114 312 C 1235 312 1280 463 1134 526 L 214 526 C 64 526 68 366 214 312 Z"/>
  <circle class="traveller" r="4.5">
    <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#loopPath" href="#loopPath"/>
    </animateMotion>
  </circle>

  <circle cx="214" cy="526" r="4" class="node"/>
  <circle cx="514" cy="312" r="4" class="node"/>
  <circle cx="814" cy="312" r="4" class="node"/>
  <circle cx="1114" cy="526" r="4" class="node"/>

  <!-- Step 1 -->
  <g transform="translate(86 210)">
    <rect id="active1" class="panel-active-fill" x="0" y="0" width="255" height="186" rx="28"/>
    <rect id="panel1" class="panel" x="0" y="0" width="255" height="186" rx="28"/>
    <circle cx="58" cy="48" r="23" stroke="rgba(201,212,206,0.5)" fill="none" stroke-width="1.2"/>
    <text x="58" y="56" text-anchor="middle" class="step-num step1-accent">01</text>
    <g class="icon soft-pulse" transform="translate(152 35)">
      <circle cx="18" cy="22" r="22"/>
      <path d="M34 38 L52 56"/>
      <path d="M7 32 L7 43"/>
      <path d="M18 24 L18 43"/>
      <path d="M29 14 L29 43"/>
    </g>
    <line x1="34" y1="104" x2="221" y2="104" class="divider"/>
    <text x="128" y="132" text-anchor="middle" class="step-label step1-accent">PIPELINE AUDIT</text>
    <text x="128" y="158" text-anchor="middle" class="micro">DIAGNOSE CURRENT FLOW</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(386 210)">
    <rect id="active2" class="panel-active-fill" x="0" y="0" width="255" height="186" rx="28"/>
    <rect id="panel2" class="panel" x="0" y="0" width="255" height="186" rx="28"/>
    <circle cx="58" cy="48" r="23" stroke="rgba(201,212,206,0.5)" fill="none" stroke-width="1.2"/>
    <text x="58" y="56" text-anchor="middle" class="step-num step2-accent">02</text>
    <g class="icon soft-pulse" transform="translate(147 32)">
      <path d="M0 0 L64 0 L39 38 L39 58 L25 64 L25 38 Z"/>
      <circle cx="66" cy="57" r="18"/>
      <path d="M66 49 L66 61"/>
      <path d="M66 68 L66 68"/>
    </g>
    <line x1="34" y1="104" x2="221" y2="104" class="divider"/>
    <text x="128" y="132" text-anchor="middle" class="step-label step2-accent">BOTTLENECK ANALYSIS</text>
    <text x="128" y="158" text-anchor="middle" class="micro">IDENTIFY FRICTION POINTS</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(686 210)">
    <rect id="active3" class="panel-active-fill" x="0" y="0" width="255" height="186" rx="28"/>
    <rect id="panel3" class="panel" x="0" y="0" width="255" height="186" rx="28"/>
    <circle cx="58" cy="48" r="23" stroke="rgba(201,212,206,0.5)" fill="none" stroke-width="1.2"/>
    <text x="58" y="56" text-anchor="middle" class="step-num step3-accent">03</text>
    <g class="icon soft-pulse" transform="translate(142 33)">
      <circle cx="27" cy="31" r="16"/>
      <path d="M27 7 L27 0 M27 62 L27 55 M3 31 L0 31 M54 31 L61 31 M10 14 L5 9 M44 48 L49 53 M44 14 L49 9 M10 48 L5 53"/>
      <circle cx="72" cy="22" r="14"/>
      <path d="M72 2 L72 -4 M72 44 L72 39 M52 22 L47 22 M92 22 L98 22 M58 8 L54 4 M86 36 L90 40 M86 8 L90 4 M58 36 L54 40"/>
    </g>
    <line x1="34" y1="104" x2="221" y2="104" class="divider"/>
    <text x="128" y="132" text-anchor="middle" class="step-label step3-accent">SYSTEM SETUP</text>
    <text x="128" y="158" text-anchor="middle" class="micro">BUILD OPERATING SYSTEM</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(986 210)">
    <rect id="active4" class="panel-active-fill" x="0" y="0" width="255" height="186" rx="28"/>
    <rect id="panel4" class="panel" x="0" y="0" width="255" height="186" rx="28"/>
    <circle cx="58" cy="48" r="23" stroke="rgba(201,212,206,0.5)" fill="none" stroke-width="1.2"/>
    <text x="58" y="56" text-anchor="middle" class="step-num step4-accent">04</text>
    <g class="icon soft-pulse" transform="translate(150 32)">
      <circle cx="25" cy="20" r="19"/>
      <path d="M0 74 C2 50 16 41 25 41 C34 41 48 50 50 74 Z"/>
      <circle cx="61" cy="58" r="19"/>
      <path d="M52 58 L59 65 L72 48"/>
    </g>
    <line x1="34" y1="104" x2="221" y2="104" class="divider"/>
    <text x="128" y="127" text-anchor="middle" class="step-label step4-accent">CRM-READY</text>
    <text x="128" y="151" text-anchor="middle" class="step-label step4-accent">LEAD OPERATIONS</text>
    <text x="128" y="174" text-anchor="middle" class="micro">READY FOR EXECUTION</text>
  </g>

  <text x="700" y="603" text-anchor="middle" class="signal">LOOPING: DIAGNOSE → BUILD → OPERATE → REFINE</text>
  <text x="700" y="648" text-anchor="middle" class="footer-brand">Novalure</text>
  <text x="700" y="676" text-anchor="middle" class="footer-slogan">we create success</text>
</svg>

  </main>
</body>
</html>
